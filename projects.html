<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <button class="theme-toggle" id="theme-btn">🌙 Dark Mode</button>

    <h1>My Live GitHub Projects</h1>
    <p style="color: var(--sub-text); margin-bottom: 40px; font-style: italic;">Fetched dynamically from my GitHub profile via API</p>

    <div id="loading" style="color: var(--sub-text); font-size: 18px;">Loading repositories from GitHub...</div>
    <div class="project-grid" id="repo-container"></div>

    <a class="nav-link" href="./index.html">&larr; Back to Home</a>

    <script>
        const container = document.getElementById("repo-container");
        const loadingText = document.getElementById("loading");

        fetch("https://api.github.com/users/Sid08M/repos")
            .then(response => response.json())
            .then(repos => {
                loadingText.style.display = "none";
                repos.forEach(repo => {
                    if (!repo.fork) {
                        const cardHtml = `
                            <div class="project-card">
                                <div>
                                    <h3>${repo.name.replace(/-/g, " ")}</h3>
                                    <p>${repo.description ? repo.description : "No description provided yet."}</p>
                                </div>
                                <a class="repo-link" href="${repo.html_url}" target="_blank">View Source Code &rarr;</a>
                            </div>
                        `;
                        container.innerHTML += cardHtml;
                    }
                });
            });
    </script>
    <script src="./theme.js"></script>
</body>
</html>
