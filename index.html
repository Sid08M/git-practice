<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* The Card Box Component */
        .card { 
            background: #ffffff; 
            padding: 40px;            /* Increased padding for internal breathing room */
            border-radius: 24px;      /* Smoother, hyper-modern rounded corners */
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            text-align: center; 
            width: 320px; 
            border: 2px solid #e0e0e0; /* Added a subtle structural border */
        }
        
        h1 { color: #111; margin: 0 0 8px 0; font-size: 28px; }
        p { color: #777; margin: 0 0 24px 0; font-size: 16px; font-style: italic; }
        
        button { 
            background: #111111;       /* Sleek black button styling */
            color: white; 
            border: none; 
            padding: 14px 20px; 
            border-radius: 50px;       /* Pill-shaped button */
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            transition: 0.2s ease;     /* Smooth transition gimmick for the hover effect */
        }
        button:hover { background: #444444; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sid</h1>
        <p>Systems & Frontend Developer</p>
        <button>View Portfolio</button>
    </div>
</body>
</html>
